<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Reset Password — YGO Skyscraper</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Exo+2:wght@300;400;600;700&display=swap"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<div id="nav-root"></div>

<div class="page-wrap" style="max-width:400px;margin:0 auto;">
  <div class="section-title">🔑 Reset Your Password</div>

  <div id="reset-loading" style="color:var(--muted);font-size:0.9rem;">Checking your reset link...</div>

  <div id="reset-invalid" class="card" style="display:none;padding:20px;">
    <p id="reset-invalid-msg" style="color:#FF6B6B;font-size:0.9rem;"></p>
  </div>

  <div id="reset-form-wrap" class="card" style="display:none;padding:20px;">
    <p style="color:var(--gold);font-weight:700;margin-bottom:16px;" id="reset-welcome"></p>
    <div class="form-group">
      <label>New password</label>
      <input id="reset-password" class="form-ctrl" type="password" placeholder="At least 6 characters" autocomplete="new-password"/>
    </div>
    <div class="form-group">
      <label>Confirm new password</label>
      <input id="reset-password2" class="form-ctrl" type="password" autocomplete="new-password"/>
    </div>
    <p id="reset-err" class="form-err"></p>
    <button class="btn-gold" style="width:100%;" onclick="submitReset()">Set New Password</button>
  </div>

  <div id="reset-success" class="card" style="display:none;padding:20px;">
    <p style="color:var(--gold);font-weight:700;">✅ Password updated!</p>
    <p style="color:var(--muted);font-size:0.85rem;margin-top:8px;">You're logged back in.</p>
    <a href="index.html" class="btn-gold" style="display:inline-block;margin-top:14px;text-decoration:none;">Go to Home Page</a>
  </div>
</div>

<div id="notif" class="notif" style="display:none;"></div>

<script src="data.js" defer></script>
<script type="module" src="nav.js"></script>
<script src="reset-password.js" defer></script>
</body>
</html>
