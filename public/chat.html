<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Chat — YGO Skyscraper</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Exo+2:wght@300;400;600;700&display=swap"/>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .chat-messages {
      height:420px; overflow-y:auto; border:1px solid var(--border); border-radius:8px;
      padding:12px; margin-bottom:10px; background:rgba(0,0,0,0.15);
    }
    .chat-msg { margin-bottom:10px; }
    .chat-msg .who { font-size:0.72rem; color:var(--gold); margin-bottom:2px; }
    .chat-msg .when { font-size:0.65rem; color:var(--muted); margin-left:6px; }
    .chat-msg .text { font-size:0.86rem; color:#E8E8F0; white-space:pre-wrap; word-break:break-word; }
    .chat-msg.mine .who { color:#7FB8FF; }
    .chat-input-row { display:flex; gap:8px; }
    .chat-input-row textarea {
      flex:1; resize:none; height:44px; padding:8px 10px; border-radius:6px;
      border:1px solid var(--border); background:var(--surface); color:#fff; font-family:inherit;
    }
  </style>
</head>
<body>

<div id="nav-root"></div>

<div class="page-wrap">
  <div class="section-title">🌐 Academy Room</div>
  <p style="color:var(--muted);font-size:0.85rem;margin-bottom:16px;">
    One shared room for every logged-in duelist. Want to talk to someone privately? Visit their profile instead.
  </p>

  <div id="chat-signed-out" class="card" style="display:none;padding:20px;">
    <p style="color:var(--muted);font-size:0.9rem;">Log in to use the chat room.</p>
  </div>

  <div id="chat-app" style="display:none;">
    <div class="chat-messages" id="chat-messages"></div>
    <div style="margin-bottom:8px;">
      <input type="file" id="chat-image-file" accept="image/*" style="display:none;" onchange="handleChatImage(event)"/>
      <button class="btn-icon" onclick="document.getElementById('chat-image-file').click()">📷 Attach Image</button>
      <span id="chat-image-status" style="font-size:0.78rem;color:var(--muted);margin-left:8px;"></span>
    </div>
    <div class="chat-input-row">
      <textarea id="chat-input" placeholder="Type a message..." maxlength="1000"></textarea>
      <button class="btn-gold" onclick="sendRoomMessage()">Send</button>
    </div>
  </div>
</div>

<div id="notif" class="notif" style="display:none;"></div>

<script src="data.js" defer></script>
<script type="module" src="nav.js"></script>
<script src="chat.js" defer></script>
</body>
</html>
