<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Forgot Password — YGO Skyscraper</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Exo+2:wght@300;400;600;700&display=swap"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<div id="nav-root"></div>

<div class="page-wrap" style="max-width:400px;margin:0 auto;">
  <div class="section-title">🔑 Forgot Password</div>
  <p style="color:var(--muted);font-size:0.85rem;margin-bottom:16px;">
    Enter your username and a moderator will send you a link to set a new password.
  </p>

  <div id="forgot-form-wrap" class="card" style="padding:20px;">
    <div class="form-group">
      <label>Username</label>
      <input id="forgot-username" class="form-ctrl" type="text" autocomplete="username"/>
    </div>
    <p id="forgot-err" class="form-err"></p>
    <button class="btn-gold" style="width:100%;" onclick="submitForgot()">Send Request</button>
  </div>

  <div id="forgot-success" class="card" style="display:none;padding:20px;">
    <p style="color:var(--gold);font-weight:700;">✅ Request sent!</p>
    <p style="color:var(--muted);font-size:0.85rem;margin-top:8px;">
      A moderator will review it and send you a reset link.
    </p>
  </div>
</div>

<div id="notif" class="notif" style="display:none;"></div>

<script src="data.js" defer></script>
<script type="module" src="nav.js"></script>
<script src="forgot-password.js" defer></script>
</body>
</html>
