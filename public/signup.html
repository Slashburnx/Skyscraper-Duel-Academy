<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Sign Up — YGO Skyscraper</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Exo+2:wght@300;400;600;700&display=swap"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<div id="nav-root"></div>

<div class="page-wrap" style="max-width:440px;margin:0 auto;">
  <div class="section-title">🎓 Sign Up</div>
  <p style="color:var(--muted);font-size:0.85rem;margin-bottom:16px;">
    Create your duelist. A moderator reviews new signups before they go live —
    once approved, you'll start in the Unassigned dorm and can roll to join a
    real dorm from your profile.
  </p>

  <div id="signup-form-wrap" class="card" style="padding:20px;">
    <div class="form-group">
      <label>Your Name</label>
      <input id="signup-name" class="form-ctrl" type="text" placeholder="How you'll appear on the site"/>
    </div>
    <div class="form-group">
      <label>Choose a username</label>
      <input id="signup-username" class="form-ctrl" type="text" placeholder="3-20 characters, letters/numbers/underscore" autocomplete="username"/>
    </div>
    <div class="form-group">
      <label>Choose a password</label>
      <input id="signup-password" class="form-ctrl" type="password" placeholder="At least 6 characters" autocomplete="new-password"/>
    </div>
    <div class="form-group">
      <label>Confirm password</label>
      <input id="signup-password2" class="form-ctrl" type="password" autocomplete="new-password"/>
    </div>
    <p id="signup-err" class="form-err"></p>
    <button class="btn-gold" style="width:100%;" onclick="submitSignup()">Submit for Approval</button>
  </div>

  <div id="signup-success" class="card" style="display:none;padding:20px;">
    <p style="color:var(--gold);font-weight:700;">✅ Request sent!</p>
    <p style="color:var(--muted);font-size:0.85rem;margin-top:8px;">
      A moderator will review your request. Once approved, you can log in from
      <a href="duelist-login.html" style="color:var(--gold);">My Account</a>.
    </p>
  </div>
</div>

<div id="notif" class="notif" style="display:none;"></div>

<script src="data.js" defer></script>
<script type="module" src="nav.js"></script>
<script src="signup.js" defer></script>
</body>
</html>
