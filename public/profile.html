<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>My Profile — YGO Skyscraper</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Exo+2:wght@300;400;600;700&display=swap"/>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .avatar-wrap { display:flex; align-items:center; gap:18px; margin-bottom:20px; flex-wrap:wrap; }
    .avatar-img {
      width:96px; height:96px; border-radius:50%; object-fit:cover;
      border:2px solid var(--gold); background:var(--surface);
    }
    .avatar-placeholder {
      width:96px; height:96px; border-radius:50%; border:2px solid var(--border);
      background:var(--surface); display:flex; align-items:center; justify-content:center;
      font-size:2.2rem; color:var(--muted);
    }
    .profile-grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap:14px; margin-bottom:24px; }
    .stat-card { padding:14px 16px; }
    .stat-card .label { font-size:0.72rem; color:var(--muted); margin-bottom:4px; }
    .stat-card .value { font-size:1.1rem; color:var(--gold); font-weight:700; }
  </style>
</head>
<body>

<div id="nav-root"></div>

<div class="page-wrap">
  <div class="section-title" id="page-heading">🎓 My Profile</div>

  <div id="profile-signed-out" class="card" style="display:none;padding:20px;">
    <p style="color:var(--muted);font-size:0.9rem;">
      Log in to view your profile. <a href="duelist-login.html" style="color:var(--gold);">Go to login</a>
    </p>
  </div>

  <div id="profile-app" style="display:none;">
    <div class="avatar-wrap">
      <div id="avatar-slot"></div>
      <div>
        <div style="color:var(--gold);font-family:'Cinzel',serif;font-size:1.3rem;font-weight:700;" id="profile-name"></div>
        <div style="color:var(--muted);font-size:0.85rem;" id="profile-dorm"></div>
        <input type="file" id="avatar-file" accept="image/*" style="display:none;" onchange="handleAvatarFile(event)"/>
        <div id="avatar-edit-controls" style="display:none;">
          <button class="btn-icon" style="margin-top:8px;font-size:0.78rem;" onclick="document.getElementById('avatar-file').click()">📷 Change Photo</button>
          <span id="avatar-status" style="font-size:0.75rem;color:var(--muted);margin-left:8px;"></span>
        </div>
      </div>
    </div>

    <div class="profile-grid">
      <div class="card stat-card"><div class="label">💰 DP</div><div class="value" id="stat-dp"></div></div>
      <div class="card stat-card"><div class="label">📚 Archetype Slots</div><div class="value" id="stat-archs"></div></div>
      <div class="card stat-card"><div class="label">🎟️ Tickets Held</div><div class="value" id="stat-tickets"></div></div>
      <div class="card stat-card"><div class="label">👑 Roles</div><div class="value" id="stat-roles"></div></div>
    </div>

    <h3 style="color:var(--gold);font-family:'Cinzel',serif;margin-bottom:10px;" id="heading-archs">📚 My Archetypes</h3>
    <div id="profile-archs" style="margin-bottom:24px;"></div>

    <h3 style="color:var(--gold);font-family:'Cinzel',serif;margin-bottom:10px;" id="heading-roles">👑 My Roles</h3>
    <div id="profile-roles" style="margin-bottom:24px;"></div>

    <h3 style="color:var(--gold);font-family:'Cinzel',serif;margin-bottom:10px;" id="heading-tickets">🎟️ My Tickets</h3>
    <div id="profile-tickets" style="margin-bottom:24px;"></div>

    <div id="profile-requests-section">
      <h3 style="color:var(--gold);font-family:'Cinzel',serif;margin-bottom:10px;">📨 My Requests</h3>
      <div id="profile-requests"></div>
    </div>
  </div>
</div>

<div id="notif" class="notif" style="display:none;"></div>

<script src="data.js" defer></script>
<script type="module" src="nav.js"></script>
<script src="profile.js" defer></script>
</body>
</html>
